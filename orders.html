<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders | Asalna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700;800&family=Marai:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="asalna-shell py-4">
    <div id="navRoot"></div>
    <section class="mt-6">
      <div class="mb-5 reveal"><p class="section-kicker">Orders</p><h1 class="text-6xl font-display mt-2">Your Asalna orders</h1></div>
      <div id="ordersRoot" class="space-y-4"></div>
    </section>
    <div id="footerRoot"></div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/orders.js"></script>
  <script>
    document.getElementById('navRoot').innerHTML = Asalna.nav('orders');
    document.getElementById('footerRoot').innerHTML = Asalna.footer();
    Asalna.updateCartCount();
  </script>
</body>
</html>
