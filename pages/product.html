<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | Asalna</title>
  <meta name="description" content="Explore each Asalna honey jar with richer detail, cleaner hierarchy, and stronger visual framing.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Marai:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="page-shell antialiased">
  <div id="navbar-root" data-component="navbar"></div>
  <main class="product-hero pb-20">
    <section class="max-w-7xl mx-auto px-4 sm:px-8 mb-8">
      <div class="hero-banner reveal-fade">
        <p class="section-kicker" data-i18n="productHeroKicker">Product detail</p>
        <h1 class="section-title" data-i18n="productHeroTitle">A jar should feel special before it is opened.</h1>
        <p class="section-copy" data-i18n="productHeroText">The product page now gives each honey type a stronger sense of story, texture, and justification.</p>
      </div>
    </section>
    <section class="max-w-7xl mx-auto px-4 sm:px-8">
      <div class="detail-panel reveal-scale">
        <div class="detail-grid">
          <div>
            <div class="detail-visual"><img id="productMainImage" src="../assets/images/sidr-honey.svg" alt="Premium honey jar" loading="eager"></div>
            <div id="galleryThumbs" class="thumb-grid"></div>
          </div>
          <article class="detail-copy">
            <p id="productCategory" class="section-kicker"></p>
            <h2 id="productName" class="font-display text-6xl text-[#24170c] mt-4"></h2>
            <div class="inline-pills mt-5">
              <span id="productPrice" class="price-pill"></span>
              <span class="status-pill" data-i18n="inStock">In stock</span>
            </div>
            <p id="productSummary" class="section-copy"></p>
            <div class="cta-row mt-6">
              <label for="quantity" class="sr-only" data-i18n="quantity">Quantity</label>
              <div class="inline-flex rounded-full overflow-hidden border border-[#24170c]/10 bg-white">
                <button id="qtyMinus" class="px-4 py-3" aria-label="Decrease quantity">-</button>
                <input id="quantity" type="number" min="1" value="1" class="w-16 text-center border-0">
                <button id="qtyPlus" class="px-4 py-3" aria-label="Increase quantity">+</button>
              </div>
              <button id="addProductToCart" class="btn-premium" data-i18n="add">Add to cart</button>
              <a href="shop.html" class="btn-ghost" data-i18n="backToShop">Back to shop</a>
            </div>
            <div class="tab-surface mt-8">
              <div class="tab-row" role="tablist" aria-label="Product details tabs">
                <button class="tab-btn active" data-tab="description" role="tab" aria-selected="true" data-i18n="tabDescription">Description</button>
                <button class="tab-btn" data-tab="ingredients" role="tab" aria-selected="false" data-i18n="tabIngredients">Ingredients</button>
                <button class="tab-btn" data-tab="benefits" role="tab" aria-selected="false" data-i18n="tabBenefits">Benefits</button>
                <button class="tab-btn" data-tab="reviews" role="tab" aria-selected="false" data-i18n="tabReviews">Reviews</button>
              </div>
              <div class="mt-6">
                <article class="tab-panel active" id="tab-description" role="tabpanel"></article>
                <article class="tab-panel" id="tab-ingredients" role="tabpanel"></article>
                <article class="tab-panel" id="tab-benefits" role="tabpanel"></article>
                <article class="tab-panel" id="tab-reviews" role="tabpanel"></article>
              </div>
            </div>
          </article>
        </div>
      </div>
    </section>
  </main>
  <div id="footer-root" data-component="footer"></div>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/product.js"></script>
</body>
</html>
