<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asalna | Premium Honey Boutique</title>
  <meta name="description" content="Asalna premium Egyptian honey boutique with artistic ecommerce experience.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700;800&family=Marai:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="asalna-shell py-4">
    <div id="navRoot"></div>

    <section class="mt-6 hero-wrap hero-premium asalna-glass reveal">
      <article class="hero-copy">
        <p class="section-kicker hero-kicker-chip" id="heroKicker"></p>
        <h1 class="hero-title font-display" id="heroTitle"></h1>
        <p class="mt-4 text-[#fff4dfd7] max-w-xl" id="heroBody"></p>
        <div class="mt-6 flex flex-wrap gap-3 hero-actions">
          <a href="shop.html" class="btn-gold" id="heroCtaShop"></a>
          <a href="#origin" class="btn-soft" id="heroCtaOrigin"></a>
        </div>
        <div class="mt-6 grid sm:grid-cols-3 gap-3 hero-stats">
          <div class="hero-stat"><strong class="block text-2xl font-display">08</strong><span class="text-xs tracking-[.18em] uppercase" id="statProducts"></span></div>
          <div class="hero-stat"><strong class="block text-2xl font-display">SM</strong><span class="text-xs tracking-[.18em] uppercase" id="statBatches"></span></div>
          <div class="hero-stat"><strong class="block text-2xl font-display">EG</strong><span class="text-xs tracking-[.18em] uppercase" id="statOrigin"></span></div>
        </div>
      </article>
      <div class="hero-media">
        <img src="assets/images/hero.jpg" alt="Asalna premium honey" data-parallax="0.06">
        <div class="float-card asalna-glass top-4 left-4 floating-card"><strong class="font-display block" id="floatTitleA"></strong><span class="text-xs text-[#3a2818b8]" id="floatBodyA"></span></div>
        <div class="float-card asalna-glass bottom-4 right-4 floating-card"><strong class="font-display block">عسلنا</strong><span class="text-xs text-[#3a2818b8]" id="floatBodyB"></span></div>
      </div>
    </section>

    <section class="mt-12 reveal">
      <div class="flex items-end justify-between gap-4 mb-5">
        <div><p class="section-kicker" id="featuredKicker"></p><h2 class="text-5xl font-display" id="featuredTitle"></h2></div>
        <a class="btn-soft" href="shop.html" id="featuredViewAll"></a>
      </div>
      <div id="featuredGrid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </section>

    <div class="honey-separator my-14 reveal"></div>

    <section class="grid lg:grid-cols-[1.1fr_.9fr] gap-5" id="origin">
      <article class="asalna-glass rounded-[2rem] p-6 reveal">
        <p class="section-kicker" id="originKicker"></p>
        <h2 class="text-5xl font-display mt-2" id="originTitle"></h2>
        <p class="mt-3 text-[#3a2818c9] leading-8" id="originBody"></p>
        <div class="grid sm:grid-cols-2 gap-3 mt-5">
          <div class="asalna-glass rounded-2xl p-4"><p class="section-kicker" id="benefitsKicker"></p><p class="mt-2 text-sm text-[#3a2818bf]" id="benefitsBody"></p></div>
          <div class="asalna-glass rounded-2xl p-4"><p class="section-kicker" id="whyKicker"></p><p class="mt-2 text-sm text-[#3a2818bf]" id="whyBody"></p></div>
        </div>
      </article>
      <div class="grid sm:grid-cols-2 gap-4">
        <article class="asalna-glass rounded-3xl p-4 reveal"><h3 class="text-4xl font-display" id="testimonialsTitle"></h3><p class="text-sm mt-2 text-[#3a2818bf]" id="testimonialsQuote"></p><p class="mt-2 text-xs tracking-[.16em] uppercase">Nour - Cairo</p></article>
        <article class="asalna-glass rounded-3xl p-4 reveal"><h3 class="text-4xl font-display" id="categoriesTitle"></h3><div id="categoryStack" class="mt-3 space-y-2"></div></article>
        <article class="asalna-glass rounded-3xl p-4 reveal sm:col-span-2"><h3 class="text-4xl font-display" id="bestTitle"></h3><div id="bestGrid" class="grid sm:grid-cols-3 gap-3 mt-3"></div></article>
      </div>
    </section>

    <section class="mt-12 reveal">
      <div class="flex items-end justify-between gap-4 mb-4"><div><p class="section-kicker" id="galleryKicker"></p><h2 class="text-5xl font-display" id="galleryTitle"></h2></div></div>
      <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <img class="rounded-3xl h-56 w-full object-cover asalna-glass" src="assets/images/hero.jpg" alt="gallery">
        <img class="rounded-3xl h-56 w-full object-cover asalna-glass" src="assets/images/honey-wildflower.jpg" alt="gallery">
        <img class="rounded-3xl h-56 w-full object-cover asalna-glass" src="assets/images/honey-blackseed.jpg" alt="gallery">
        <img class="rounded-3xl h-56 w-full object-cover asalna-glass" src="assets/images/honey-citrus.jpg" alt="gallery">
      </div>
    </section>

    <section class="mt-12 asalna-glass rounded-[2rem] p-6 reveal" style="background:linear-gradient(130deg, rgba(28,17,9,.95), rgba(84,50,17,.9) 56%, rgba(93,98,50,.82)); color:#fff4df;">
      <p class="section-kicker !text-[#f8e3b6]" id="newsletterKicker"></p>
      <h2 class="text-5xl font-display mt-2" id="newsletterTitle"></h2>
      <p class="mt-3 text-[#fff4dfcc]" id="newsletterBody"></p>
      <form class="mt-5 grid sm:grid-cols-[1fr_auto] gap-3" id="newsletterForm">
        <input id="newsletterEmail" class="asalna-input !bg-white/90 !text-[#1f150c]" required type="email" placeholder="Email address">
        <button id="newsletterBtn" class="btn-gold"></button>
      </form>
    </section>

    <div id="footerRoot"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    (function () {
      document.getElementById('navRoot').innerHTML = Asalna.nav('index');
      document.getElementById('footerRoot').innerHTML = Asalna.footer();

      const ar = Asalna.isArabic();
      const t = {
        heroKicker: ar ? 'بيت عسل فاخر' : 'Luxury Honey House',
        heroTitle: ar ? 'عسلنا يحول العسل المصري إلى طقس حديث متوهج.' : 'Asalna shapes Egyptian honey into a glowing modern ritual.',
        heroBody: ar ? 'تجربة بوتيك ملهمة من انسياب العسل وهندسة الشمع وأجواء ذهبية دافئة.' : 'A boutique ecommerce world inspired by honey flow, wax-cell geometry, and warm golden atmosphere.',
        heroCtaShop: ar ? 'تسوق المجموعة' : 'Shop Collection',
        heroCtaOrigin: ar ? 'قصة المصدر' : 'Origin Story',
        statProducts: ar ? 'منتجات مختارة' : 'Curated products',
        statBatches: ar ? 'دفعات صغيرة' : 'Small batches',
        statOrigin: ar ? 'مصدر مصري' : 'Egyptian origin',
        floatTitleA: ar ? 'سدر ريزيرف' : 'Sidr Reserve',
        floatBodyA: ar ? 'حصاد موسمي محدود' : 'Limited seasonal harvest',
        floatBodyB: ar ? 'دفء مصري فاخر' : 'Premium Egyptian warmth',
        featuredKicker: ar ? 'عسل مميز' : 'Featured Honey',
        featuredTitle: ar ? 'إصدارات التوقيع' : 'Signature drops',
        featuredViewAll: ar ? 'عرض الكل' : 'View all',
        originKicker: ar ? 'قصة منشأ العسل' : 'Honey Origin Story',
        originTitle: ar ? 'من زهر الصحراء إلى طقس مائدة راقٍ.' : 'From desert bloom to refined table ritual.',
        originBody: ar ? 'تتعاون أصلنا مع مجتمعات النحالين المصريين من مرتفعات سيناء إلى زهور الدلتا وبساتين الحمضيات. كل برطمان يحمل شفافية المصدر ونوتات التذوق وتقديمًا فاخرًا.' : 'Asalna partners with Egyptian beekeeping communities across Sinai heights, Delta blossoms, and citrus fields. Every jar carries source clarity, taste notes, and premium presentation.',
        benefitsKicker: ar ? 'فوائد العسل' : 'Benefits of Honey',
        benefitsBody: ar ? 'حلاوة طبيعية ونكهة عطرية وقوام متوازن للاستخدام اليومي.' : 'Natural sweetness, aromatic depth, and balanced texture for daily use.',
        whyKicker: ar ? 'لماذا أصلنا' : 'Why Asalna',
        whyBody: ar ? 'هوية بصرية مميزة وجودة ممتازة وتجربة شراء كاملة تعمل بالكامل.' : 'Distinct visual identity, premium quality, and fully working ecommerce logic.',
        testimonialsTitle: ar ? 'آراء العملاء' : 'Testimonials',
        testimonialsQuote: ar ? '"الطعم غني والهوية فعلاً فاخرة."' : '"The taste is rich and the brand feels truly luxurious."',
        categoriesTitle: ar ? 'الفئات' : 'Categories',
        bestTitle: ar ? 'الأكثر مبيعًا' : 'Best Sellers',
        galleryKicker: ar ? 'معرض إنستجرام' : 'Instagram Gallery',
        galleryTitle: ar ? 'مزاج العسل' : 'Honey moodboard',
        newsletterKicker: ar ? 'النشرة البريدية' : 'Newsletter',
        newsletterTitle: ar ? 'انضم لدائرتنا الذهبية' : 'Join our golden circle',
        newsletterBody: ar ? 'استقبل الإصدارات المحدودة وعروض الهدايا الموسمية وقصص العسل الحرفي.' : 'Receive limited releases, seasonal gift drops, and craft honey stories.',
        newsletterBtn: ar ? 'اشترك' : 'Subscribe'
      };
      Object.keys(t).forEach((key) => {
        const node = document.getElementById(key);
        if (node) node.textContent = t[key];
      });
      document.getElementById('newsletterEmail').placeholder = ar ? 'البريد الإلكتروني' : 'Email address';

      const products = Asalna.getProducts();
      const featured = products.filter((p) => p.tags.includes('best') || p.badge === 'Limited').slice(0, 4);
      const best = products.filter((p) => p.tags.includes('best')).slice(0, 3);
      const categories = [...new Set(products.map((p) => p.category))];

      document.getElementById('featuredGrid').innerHTML = featured.map((p) => `
        <article class="asalna-glass product-card floating-card reveal">
          <img src="${p.image}" alt="${p.name}">
          <div class="p-3"><span class="badge-pill">${Asalna.localBadge(p.badge)}</span><h3 class="font-display text-3xl mt-2">${ar ? (p.nameAr || p.name) : p.name}</h3><p class="text-sm text-[#3a2818bf] mt-2">${ar ? p.description : p.short}</p><div class="mt-3 flex items-center justify-between"><strong>${Asalna.money(p.price)}</strong><a class="btn-soft text-sm" href="product.html?id=${p.id}">${ar ? 'عرض' : 'View'}</a></div></div>
        </article>
      `).join('');

      document.getElementById('bestGrid').innerHTML = best.map((p) => `<a href="product.html?id=${p.id}" class="asalna-glass rounded-2xl p-3 block"><p class="text-xs section-kicker">${Asalna.localBadge(p.badge)}</p><h4 class="font-display text-2xl mt-1">${ar ? (p.nameAr || p.name) : p.name}</h4><p class="text-sm mt-1">${Asalna.money(p.price)}</p></a>`).join('');
      document.getElementById('categoryStack').innerHTML = categories.map((c) => `<div class="badge-pill">${Asalna.localCategory(c)}</div>`).join('');

      document.getElementById('newsletterForm').addEventListener('submit', function (e) { e.preventDefault(); Asalna.toast(ar ? 'تم الاشتراك بنجاح' : 'Subscribed successfully'); this.reset(); });

      Asalna.updateCartCount();
      Asalna.applyReveal();
      Asalna.initParallax();
    })();
  </script>
</body>
</html>
